spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix: t_
      table-underline: true


# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.cn.blogsystem.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  enhanced: true
  setting:
    language: zh_cn
  # 显式开启 JWT 支持 (部分版本需要此配置才能自动在 UI 显示输入框)
  jwt:
    enable: true
    header: Authorization
    prefix: "Bearer "

